
<style>
.pmw-wrap{font-family:var(--font-sans);max-width:760px;padding:1rem 0}
.pmw-title{font-size:18px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px}
.pmw-sub{font-size:13px;color:var(--color-text-secondary);margin-bottom:1.5rem}
.pmw-section{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:12px}
.pmw-section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.pmw-seq-stats{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.pmw-stat{font-size:13px;color:var(--color-text-secondary)}
.pmw-stat b{color:var(--color-text-primary);font-weight:500}
.pmw-pair{display:grid;grid-template-columns:1fr 28px 1fr 28px;gap:8px;align-items:end;padding:10px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);margin-bottom:8px}
.pmw-pair:last-child{margin-bottom:0}
.pmw-field label{font-size:11px;font-weight:500;letter-spacing:.05em;display:block;margin-bottom:4px}
.pmw-field label.orig{color:#B85C3A}
.pmw-field label.mut{color:#0F6E56}
.pmw-arrow{font-size:14px;color:var(--color-text-secondary);text-align:center;padding-bottom:6px}
.pmw-rm{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);cursor:pointer;font-size:14px;padding:6px;line-height:1;width:28px;height:34px;display:flex;align-items:center;justify-content:center}
.pmw-rm:hover{border-color:#E24B4A;color:#E24B4A}
.pmw-add-btn{background:none;border:0.5px dashed var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);cursor:pointer;font-size:13px;padding:8px 14px;width:100%;margin-top:8px}
.pmw-add-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.pmw-actions{display:flex;gap:8px;margin-bottom:12px}
.pmw-calc-btn{flex:1;background:var(--color-background-primary);border:0.5px solid var(--color-border-primary);border-radius:var(--border-radius-md);color:var(--color-text-primary);cursor:pointer;font-size:14px;font-weight:500;padding:10px}
.pmw-calc-btn:hover{background:var(--color-background-secondary)}
.pmw-clear-btn{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);cursor:pointer;font-size:13px;padding:10px 16px}
.pmw-clear-btn:hover{border-color:#E24B4A;color:#E24B4A}
.pmw-result{display:none;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem}
.pmw-result.ok{display:block;border-color:#1D9E75}
.pmw-result.err{display:block;border-color:#E24B4A}
.pmw-mw-big{font-size:28px;font-weight:500;color:var(--color-text-primary);line-height:1.1}
.pmw-mw-sub{font-size:13px;color:var(--color-text-secondary);margin-top:2px;margin-bottom:12px}
.pmw-breakdown{border-top:0.5px solid var(--color-border-tertiary);padding-top:10px;margin-top:4px;display:flex;flex-wrap:wrap;gap:12px}
.pmw-bk-item{font-size:12px;color:var(--color-text-secondary)}
.pmw-bk-item b{color:var(--color-text-primary);font-weight:500}
.pmw-copy-btn{background:none;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);color:var(--color-text-secondary);cursor:pointer;font-size:12px;padding:4px 10px;margin-top:10px}
.pmw-copy-btn:hover{border-color:var(--color-border-primary);color:var(--color-text-primary)}
.pmw-err-msg{font-size:13px;color:#E24B4A}
textarea{width:100%;font-family:var(--font-mono);font-size:13px;line-height:1.6;letter-spacing:.04em}
select{font-size:12px;width:100%}
</style>

<div class="pmw-wrap">
<div class="pmw-title">Protein MW Calculator</div>
<div class="pmw-sub">Residue summation · Non-canonical amino acid support · Mutation correction</div>

<div class="pmw-section">
  <div class="pmw-section-label">Amino acid sequence</div>
  <textarea id="pmw-seq" rows="4" placeholder="Paste single-letter sequence (lowercase accepted)"></textarea>
  <div class="pmw-seq-stats">
    <div class="pmw-stat">Length: <b id="pmw-len">0</b> aa</div>
    <div class="pmw-stat">Base MW: <b id="pmw-live">—</b></div>
    <div class="pmw-stat" id="pmw-warn" style="color:#E24B4A;display:none"></div>
  </div>
</div>

<div class="pmw-section">
  <div class="pmw-section-label">Mutations / Non-canonical substitutions</div>
  <div id="pmw-pairs"></div>
  <button class="pmw-add-btn" onclick="pmwAddPair()">+ Add mutation pair</button>
</div>

<div class="pmw-actions">
  <button class="pmw-calc-btn" onclick="pmwCalc()">Calculate molecular weight</button>
  <button class="pmw-clear-btn" onclick="pmwClear()">Clear</button>
</div>

<div class="pmw-result" id="pmw-result">
  <div id="pmw-result-content"></div>
</div>
</div>

<script>
const pmwRes = {
  A:71.079,C:103.139,D:115.088,E:129.115,F:147.177,
  G:57.052,H:137.142,I:113.16,K:128.175,L:113.16,
  M:131.193,N:114.104,P:97.117,Q:128.131,R:156.189,
  S:87.078,T:101.105,V:99.133,W:186.214,Y:163.176
};

const pmwCanon = [
  ["0","None"],["89.094","A – Alanine"],["121.154","C – Cysteine"],
  ["133.103","D – Aspartate"],["147.130","E – Glutamate"],["165.192","F – Phenylalanine"],
  ["75.067","G – Glycine"],["155.157","H – Histidine"],["131.175","I – Isoleucine"],
  ["146.190","K – Lysine"],["131.175","L – Leucine"],["149.208","M – Methionine"],
  ["132.119","N – Asparagine"],["115.132","P – Proline"],["146.146","Q – Glutamine"],
  ["174.204","R – Arginine"],["105.093","S – Serine"],["119.120","T – Threonine"],
  ["117.148","V – Valine"],["204.229","W – Tryptophan"],["181.191","Y – Tyrosine"]
];

const pmwNcaa = [
  ["180.17","3cnpa"],["200.15","3no2pa"],["359.256","5FAzoF"],["301.350","AAPF"],
  ["207.229","AcetylPhe (AcF)"],["180.207","AminoPhe (AmF)"],["205.217","AzaTrp (AzaW)"],
  ["206.205","AzidoPhe (AzF)"],["243.266","BiPyridylAla (BPyA)"],["246.307","BocLys (BocK)"],
  ["221.019","BoronicPhe (BoW)"],["209.008","BoronoPhe (BoF)"],["241.070","BoronoPhenylCys (BPC)"],
  ["283.125","BromoTrp (BrW)"],["263.27","CBDS"],["238.671","ChloroTrp (ClW)"],
  ["263.249","Coumarin (Hco)"],["190.202","CyanoPhe (CNF)"],["191.190","CyanoPyridylAla (CNP)"],
  ["229.239","CyanoTrp (CNW)"],["266.238","CysCF3"],["223.250","CysCNP"],["224.238","CysCNPym"],
  ["231.215","DiCyanoPyridinyl-DAP (DCPN1)"],["201.173","DiFluoroPhe (F2F)"],
  ["217.172","DiFluoroTyr (F2Y)"],["235.615","DiFluoroChloroPhe (F2ClF)"],
  ["243.30","FluoroEthylPhenylCys (FetPhC)"],["183.182","FluoroPhe (FF)"],
  ["222.219","FluoroTrp (FW)"],["199.181","FluoroTyr (FY)"],["232.239","FormylTrp (CHOW)"],
  ["-21.04","GFP Chromophore (−H5O)"],["316.328","H-Cys(DMNB)"],["220.228","HydroxyTrp (OHW)"],
  ["234.255","MethoxyTrp (MeOW)"],["262.265","MethyloxycarboxyTrp (MeCOOW)"],
  ["179.219","MethylPhe (mF)"],["267.201","NBDO"],["330.17","NBDSe"],
  ["249.23","NitroTrp (NO2W)"],["256.276","o-NitroBenzylCys (oNBCys)"],
  ["303.19","o-NitroBenzylSec (oNBSec)"],["255.144","PentaFluoroPhe (F5F)"],
  ["291.236","PentaFluorosulfanylPhe (SF5)"],["340.16","PF7"],
  ["185.072","PhosphoSer (pSer)"],["199.099","PhosphoThr (pThr)"],
  ["219.240","PropargylTyr (ProY)"],["-23.05","RFP Chromophore (−H7O)"],
  ["168.07","Selenocysteine (Sec)"],["261.248","SulfoTyr (SO3Y)"],
  ["237.299","tert-ButylTyr (tBuY)"],["242.198","TFALys (TFAK)"],
  ["276.408","TMSLys (TMSK)"],["275.424","TMS(amide)Lys (TMSNK)"],
  ["233.190","CF3Phe (CF3F)"],["249.189","CF3Tyr (CF3Y)"]
];

function pmwBuildOpts(includeNcaa) {
  let h = pmwCanon.map(([v,n])=>`<option value="${v}">${n}</option>`).join('');
  if (includeNcaa) {
    h += `<optgroup label="Non-canonical amino acids">`;
    h += pmwNcaa.map(([v,n])=>`<option value="${v}">${n}</option>`).join('');
    h += `</optgroup>`;
  }
  return h;
}

let pmwPairId = 0;
const pmwPairIds = [];

function pmwAddPair() {
  const grid = document.getElementById('pmw-pairs');
  if (grid.children.length >= 5) return;
  const id = ++pmwPairId;
  pmwPairIds.push(id);
  const num = grid.children.length + 1;
  const div = document.createElement('div');
  div.className = 'pmw-pair';
  div.id = `pmw-pair-${id}`;
  div.innerHTML = `
    <div class="pmw-field">
      <label class="orig">Original residue ${num}</label>
      <select id="pmw-orig-${id}">${pmwBuildOpts(false)}</select>
    </div>
    <div class="pmw-arrow">→</div>
    <div class="pmw-field">
      <label class="mut">Mutant residue ${num}</label>
      <select id="pmw-mut-${id}">${pmwBuildOpts(true)}</select>
    </div>
    <button class="pmw-rm" onclick="pmwRemovePair(${id})" title="Remove">✕</button>
  `;
  grid.appendChild(div);
}

function pmwRemovePair(id) {
  const el = document.getElementById(`pmw-pair-${id}`);
  if (el) el.remove();
}

function pmwGetSeq() {
  return document.getElementById('pmw-seq').value.replace(/\s/g,'').toUpperCase();
}

function pmwUpdateLive() {
  const raw = document.getElementById('pmw-seq').value.toUpperCase();
  document.getElementById('pmw-seq').value = raw.replace(/[^ACDEFGHIKLMNPQRSTVWY\s\n\r]/gi,'');
  const seq = pmwGetSeq();
  document.getElementById('pmw-len').textContent = seq.length;
  const warnEl = document.getElementById('pmw-warn');
  if (!seq.length) {
    document.getElementById('pmw-live').textContent = '—';
    warnEl.style.display = 'none';
    return;
  }
  let mw = 18.015;
  let badChar = null;
  for (const aa of seq) {
    if (!pmwRes[aa]) { badChar = aa; break; }
    mw += pmwRes[aa];
  }
  if (badChar) {
    document.getElementById('pmw-live').textContent = '—';
    warnEl.textContent = `Unknown residue: "${badChar}"`;
    warnEl.style.display = 'block';
  } else {
    const kda = (mw/1000).toFixed(3);
    document.getElementById('pmw-live').textContent = `${mw.toFixed(2)} Da (${kda} kDa)`;
    warnEl.style.display = 'none';
  }
}

function pmwCalc() {
  const seq = pmwGetSeq();
  const resultEl = document.getElementById('pmw-result');
  const contentEl = document.getElementById('pmw-result-content');

  function showErr(msg) {
    resultEl.className = 'pmw-result err';
    contentEl.innerHTML = `<div class="pmw-err-msg">${msg}</div>`;
  }

  if (!seq) { showErr('Please enter an amino acid sequence.'); return; }

  let baseMW = 18.015;
  for (const aa of seq) {
    if (!pmwRes[aa]) { showErr(`Invalid residue: "${aa}". Use standard single-letter codes.`); return; }
    baseMW += pmwRes[aa];
  }

  let correction = 0;
  const deltas = [];
  const grid = document.getElementById('pmw-pairs');
  for (const pairEl of grid.children) {
    const pairId = pairEl.id.replace('pmw-pair-','');
    const origSel = document.getElementById(`pmw-orig-${pairId}`);
    const mutSel = document.getElementById(`pmw-mut-${pairId}`);
    if (!origSel || !mutSel) continue;
    const ov = parseFloat(origSel.value) || 0;
    const mv = parseFloat(mutSel.value) || 0;
    if (ov !== 0 || mv !== 0) {
      const delta = mv - ov;
      correction += delta;
      deltas.push({
        origName: origSel.options[origSel.selectedIndex].text,
        mutName: mutSel.options[mutSel.selectedIndex].text,
        delta
      });
    }
  }

  const finalMW = baseMW + correction;
  const sign = v => (v >= 0 ? '+' : '') + v.toFixed(3);

  let bk = `<div class="pmw-bk-item">Base MW <b>${baseMW.toFixed(3)} Da</b></div>`;
  bk += `<div class="pmw-bk-item">Length <b>${seq.length} aa</b></div>`;
  for (const d of deltas) {
    bk += `<div class="pmw-bk-item">${d.origName.split('–')[0].trim()} → ${d.mutName.split('(')[0].trim()} <b>${sign(d.delta)} Da</b></div>`;
  }
  if (deltas.length) bk += `<div class="pmw-bk-item">Correction <b>${sign(correction)} Da</b></div>`;

  contentEl.innerHTML = `
    <div class="pmw-mw-big">${finalMW.toFixed(3)} Da</div>
    <div class="pmw-mw-sub">${(finalMW/1000).toFixed(4)} kDa</div>
    <div class="pmw-breakdown">${bk}</div>
    <button class="pmw-copy-btn" onclick="pmwCopy('${finalMW.toFixed(3)} Da / ${(finalMW/1000).toFixed(4)} kDa', this)">Copy result</button>
  `;
  resultEl.className = 'pmw-result ok';
}

function pmwCopy(text, btn) {
  navigator.clipboard.writeText(text).then(()=>{
    btn.textContent = 'Copied!';
    setTimeout(()=>btn.textContent='Copy result', 1500);
  });
}

function pmwClear() {
  document.getElementById('pmw-seq').value = '';
  pmwUpdateLive();
  const grid = document.getElementById('pmw-pairs');
  for (const pairEl of grid.children) {
    const id = pairEl.id.replace('pmw-pair-','');
    const o = document.getElementById(`pmw-orig-${id}`);
    const m = document.getElementById(`pmw-mut-${id}`);
    if (o) o.selectedIndex = 0;
    if (m) m.selectedIndex = 0;
  }
  document.getElementById('pmw-result').className = 'pmw-result';
}

document.getElementById('pmw-seq').addEventListener('input', pmwUpdateLive);
pmwAddPair();
pmwAddPair();
</script>
