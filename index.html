<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Protein Molecular Weight Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&amp;family=JetBrains+Mono:wght@400&amp;display=swap" rel="stylesheet">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
  <style>
    :root {
      --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;
      --bg-page:       #f0ece3;
      --bg-primary:    #ffffff;
      --bg-secondary:  #f5f1ea;
      --text-primary:  #1c1a17;
      --text-secondary:#6b6760;
      --border-lo:     #e4dfd6;
      --border-mid:    #cec9bf;
      --border-hi:     #b0aba0;
      --radius-md: 8px;
      --radius-lg: 12px;
      --teal-bg:    #e1f5ee;
      --teal-border:#9fe1cb;
      --teal-text:  #085041;
      --teal-dot:   #1d9e75;
      --teal-dark:  #04342c;
      --coral-dot:  #d85a30;
      --coral-text: #8b3a1e;
      --red-bg:     #fcebeb;
      --red-border: #f7c1c1;
      --red-text:   #791f1f;
      --red-label:  #a32d2d;
      --green-pos:  #0f6e56;
      --coral-neg:  #993c1d;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-page);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .pmw { width: 100%; max-width: 720px; }

    /* Header */
    .pmw-header {
      display: flex; align-items: flex-start; gap: 14px;
      margin-bottom: 1.75rem; padding-bottom: 1.25rem;
      border-bottom: 0.5px solid var(--border-lo);
    }
    .pmw-icon {
      width: 38px; height: 38px; background: #085041;
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .pmw-icon svg { width: 20px; height: 20px; fill: none; stroke: #5dcaa5; stroke-width: 2; stroke-linecap: round; }
    .pmw-header-text { flex: 1; }
    .pmw-header h1 { font-size: 20px; font-weight: 500; color: var(--text-primary); line-height: 1.2; }
    .pmw-badge {
      display: inline-block; margin-top: 5px;
      background: var(--teal-bg); border: 0.5px solid var(--teal-border);
      border-radius: 20px; padding: 2px 10px;
      font-size: 11px; font-weight: 500; color: var(--teal-text);
    }
    .pmw-custom-toggle {
      align-self: center; background: none;
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      color: var(--text-secondary); cursor: pointer;
      font-family: var(--font-sans); font-size: 12px; font-weight: 500;
      padding: 6px 12px; white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .pmw-custom-toggle:hover { border-color: var(--teal-dot); color: var(--teal-text); }

    /* Cards */
    .pmw-card {
      background: var(--bg-primary); border: 0.5px solid var(--border-lo);
      border-radius: var(--radius-lg); margin-bottom: 10px; overflow: hidden;
    }
    .pmw-card-top {
      padding: 9px 16px; border-bottom: 0.5px solid var(--border-lo);
      background: var(--bg-secondary); display: flex; align-items: center; gap: 7px;
    }
    .pmw-card-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--teal-dot); flex-shrink: 0; }
    .pmw-card-top span { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--text-secondary); }
    .pmw-card-body { padding: 14px 16px; }

    /* Sequence */
    textarea.pmw-seq {
      width: 100%; background: #0c1410; border: none; border-radius: var(--radius-md);
      color: #4dbc8a; font-family: var(--font-mono); font-size: 13px;
      line-height: 1.75; letter-spacing: .05em;
      padding: 12px 14px; resize: vertical; outline: none; caret-color: #4dbc8a;
    }
    textarea.pmw-seq::placeholder { color: #1e3a28; }
    .pmw-stats { display: flex; margin-top: 10px; border: 0.5px solid var(--border-lo); border-radius: var(--radius-md); overflow: hidden; }
    .pmw-stat { flex: 1; padding: 7px 12px; background: var(--bg-secondary); font-size: 12px; color: var(--text-secondary); border-right: 0.5px solid var(--border-lo); }
    .pmw-stat:last-child { border-right: none; }
    .pmw-stat b { color: var(--text-primary); font-weight: 500; font-size: 12px; }
    .pmw-warn { flex: 2; padding: 7px 12px; background: var(--red-bg); font-size: 12px; color: var(--red-label); display: none; }
    .pmw-stats2 { display: flex; margin-top: 1px; border: 0.5px solid var(--border-lo); border-top: none; border-radius: 0 0 var(--radius-md) var(--radius-md); overflow: hidden; }
    .pmw-stats2 .pmw-stat { border-top: none; }
    .pmw-stats2 .pmw-stat sup { font-size: 9px; }

    /* Mutation pairs */
    .pmw-pairs { display: flex; flex-direction: column; gap: 8px; }
    .pmw-pair {
      border: 0.5px solid var(--border-lo); border-radius: var(--radius-md);
      padding: 12px 14px; background: var(--bg-secondary);
      display: grid; grid-template-columns: 1fr 30px 1fr 30px; gap: 10px; align-items: end;
    }
    .pmw-pair-label { font-size: 11px; font-weight: 500; letter-spacing: .05em; display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
    .pmw-pair-label .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pmw-pair-label.orig { color: var(--coral-text); }
    .pmw-pair-label.orig .dot { background: var(--coral-dot); }
    .pmw-pair-label.mut  { color: var(--teal-text); }
    .pmw-pair-label.mut  .dot { background: var(--teal-dot); }
    select {
      width: 100%; font-family: var(--font-sans); font-size: 12px;
      color: var(--text-primary); background: var(--bg-primary);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 6px 8px; outline: none; cursor: pointer;
    }
    select:focus { border-color: var(--border-hi); }
    .pmw-arr { display: flex; align-items: center; justify-content: center; padding-bottom: 5px; color: var(--text-secondary); font-size: 15px; }
    .pmw-rm {
      background: none; border: 0.5px solid var(--border-lo); border-radius: 6px;
      color: var(--text-secondary); cursor: pointer; font-size: 12px;
      width: 30px; height: 34px; display: flex; align-items: center; justify-content: center;
      align-self: end; transition: border-color .15s, color .15s;
    }
    .pmw-rm:hover { border-color: #e24b4a; color: #e24b4a; }
    .pmw-add {
      width: 100%; margin-top: 8px; background: none;
      border: 0.5px dashed var(--border-mid); border-radius: var(--radius-md);
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
      font-size: 13px; padding: 9px; transition: border-color .15s, color .15s;
    }
    .pmw-add:hover { border-color: var(--teal-dot); color: var(--teal-text); }

    /* Actions */
    .pmw-actions { display: flex; gap: 8px; margin-bottom: 10px; }
    .pmw-calc {
      flex: 1; background: #085041; border: none; border-radius: var(--radius-md);
      color: #fff; cursor: pointer; font-family: var(--font-sans); font-size: 14px;
      font-weight: 500; padding: 11px; transition: background .15s;
    }
    .pmw-calc:hover { background: var(--teal-dark); }
    .pmw-clr {
      background: none; border: 0.5px solid var(--border-lo); border-radius: var(--radius-md);
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
      font-size: 13px; padding: 11px 18px; transition: border-color .15s, color .15s;
    }
    .pmw-clr:hover { border-color: #e24b4a; color: #e24b4a; }

    /* Result */
    .pmw-result { display: none; border-radius: var(--radius-lg); overflow: hidden; border: 0.5px solid var(--border-lo); }
    .pmw-result.ok  { display: block; border-color: var(--teal-dot); }
    .pmw-result.err { display: block; border-color: #e24b4a; }
    .pmw-result-banner {
      padding: 8px 16px; font-size: 10px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; display: flex; align-items: center; gap: 6px;
    }
    .pmw-result.ok  .pmw-result-banner { background: var(--teal-bg); color: var(--teal-text); border-bottom: 0.5px solid var(--teal-border); }
    .pmw-result.err .pmw-result-banner { background: var(--red-bg);  color: var(--red-text);  border-bottom: 0.5px solid var(--red-border); }
    .pmw-result-body { padding: 18px 16px 14px; background: var(--bg-primary); }
    .pmw-mw-row { display: flex; align-items: baseline; gap: 10px; margin-bottom: 2px; }
    .pmw-mw { font-size: 40px; font-weight: 500; color: var(--text-primary); line-height: 1; }
    .pmw-unit { font-size: 15px; color: var(--text-secondary); font-weight: 400; }
    .pmw-kda { font-size: 14px; color: var(--text-secondary); margin-bottom: 14px; }
    .pmw-chips { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 12px; border-top: 0.5px solid var(--border-lo); }
    .pmw-chip { background: var(--bg-secondary); border: 0.5px solid var(--border-lo); border-radius: 20px; padding: 4px 11px; font-size: 12px; color: var(--text-secondary); }
    .pmw-chip b { color: var(--text-primary); font-weight: 500; }
    .pmw-chip.delta-pos b { color: var(--green-pos); }
    .pmw-chip.delta-neg b { color: var(--coral-neg); }
    .pmw-err-msg { font-size: 13px; color: var(--red-label); padding: 2px 0; }
    .pmw-copy {
      background: none; border: 0.5px solid var(--border-lo); border-radius: 6px;
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
      font-size: 12px; padding: 4px 10px; margin-top: 10px; display: inline-block;
      transition: border-color .15s, color .15s;
    }
    .pmw-copy:hover { border-color: var(--teal-dot); color: var(--teal-text); }

    /* Backdrop */
    .pmw-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.18); z-index: 150; display: none; }
    .pmw-backdrop.open { display: block; }

    /* Side panel */
    .pmw-panel {
      position: fixed; top: 0; right: 0; height: 100vh; width: 320px;
      background: var(--bg-primary); border-left: 0.5px solid var(--border-lo);
      transform: translateX(100%); transition: transform 0.25s ease;
      z-index: 200; display: flex; flex-direction: column; overflow: hidden;
    }
    .pmw-panel.open { transform: translateX(0); }
    .pmw-panel-hd {
      padding: 12px 16px; border-bottom: 0.5px solid var(--border-lo);
      background: var(--bg-secondary);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .pmw-panel-hd span { font-size: 13px; font-weight: 500; color: var(--text-primary); }
    .pmw-panel-close { background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 16px; padding: 2px 4px; line-height: 1; }
    .pmw-panel-close:hover { color: var(--text-primary); }
    .pmw-panel-body { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 20px; }
    .pmw-panel-slabel { font-size: 10px; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }

    /* Custom list */
    .pmw-ci-list { display: flex; flex-direction: column; gap: 6px; }
    .pmw-ci-empty { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 14px 0; border: 0.5px dashed var(--border-mid); border-radius: var(--radius-md); }
    .pmw-ci {
      display: flex; align-items: center; gap: 8px; padding: 8px 10px;
      background: var(--bg-secondary); border: 0.5px solid var(--border-lo); border-radius: var(--radius-md);
    }
    .pmw-ci-info { flex: 1; min-width: 0; }
    .pmw-ci-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pmw-ci-mw { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
    .pmw-ci-del {
      background: none; border: 0.5px solid var(--border-lo); border-radius: 6px;
      color: var(--text-secondary); cursor: pointer; font-size: 11px;
      width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: border-color .15s, color .15s;
    }
    .pmw-ci-del:hover { border-color: #e24b4a; color: #e24b4a; }

    /* Add form */
    .pmw-form { display: flex; flex-direction: column; gap: 8px; }
    .pmw-form-row { display: flex; flex-direction: column; gap: 4px; }
    .pmw-form-row label { font-size: 11px; font-weight: 500; color: var(--text-secondary); }
    .pmw-form-row input {
      width: 100%; font-family: var(--font-sans); font-size: 13px;
      color: var(--text-primary); background: var(--bg-primary);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      padding: 8px 10px; outline: none; transition: border-color .15s;
    }
    .pmw-form-row input:focus { border-color: var(--border-hi); }
    .pmw-form-row input::placeholder { color: var(--border-hi); }
    .pmw-form-err { font-size: 11px; color: var(--red-label); display: none; }
    .pmw-form-submit {
      width: 100%; background: var(--bg-secondary);
      border: 0.5px solid var(--border-mid); border-radius: var(--radius-md);
      color: var(--text-primary); cursor: pointer; font-family: var(--font-sans);
      font-size: 13px; font-weight: 500; padding: 9px;
      transition: background .15s, border-color .15s; margin-top: 2px;
    }
    .pmw-form-submit:hover { background: #eae6de; border-color: var(--border-hi); }

    /* Panel footer */
    .pmw-panel-ft { padding: 12px 16px; border-top: 0.5px solid var(--border-lo); background: var(--bg-secondary); flex-shrink: 0; }
    .pmw-save-btn {
      width: 100%; background: #085041; border: none; border-radius: var(--radius-md);
      color: #fff; cursor: pointer; font-family: var(--font-sans); font-size: 13px;
      font-weight: 500; padding: 10px; transition: background .15s;
    }
    .pmw-save-btn:hover { background: var(--teal-dark); }
    .pmw-save-note { font-size: 11px; color: var(--text-secondary); text-align: center; margin-top: 6px; line-height: 1.4; }

    .pmw-lock-btn {
      background: none; border: 0.5px solid var(--border-lo); border-radius: 4px;
      color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans);
      font-size: 10px; font-weight: 500; padding: 2px 8px;
      transition: border-color .15s, color .15s;
    }
    .pmw-lock-btn:hover { border-color: var(--border-hi); color: var(--text-primary); }
    .pmw-lock-info { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; }
    .pmw-form-ok { font-size: 11px; color: var(--green-pos); display: none; margin-top: 2px; }

    .pmw-struct-row {
      grid-column: 1 / -1;
      margin-top: 10px;
    }
    .pmw-struct-wrap {
      background: var(--bg-primary);
      border: 0.5px solid var(--border-lo);
      border-radius: var(--radius-lg);
      overflow: hidden;
      padding: 8px 4px;
    }
    .pmw-struct-canvas {
      width: 100% !important;
      height: 200px;
      display: block;
      background: transparent !important;
    }


    body.dark {
      --bg-page:       #1a1816;
      --bg-primary:    #242220;
      --bg-secondary:  #2c2a28;
      --text-primary:  #f0ece3;
      --text-secondary:#9e9a94;
      --border-lo:     #3a3834;
      --border-mid:    #4a4844;
      --border-hi:     #5e5c58;
      --teal-bg:       #0c2820;
      --teal-border:   #1d6050;
      --teal-text:     #4dbc8a;
      --teal-dot:      #1d9e75;
      --teal-dark:     #5dcaa5;
      --coral-text:    #e07050;
      --red-bg:        #2a1818;
      --red-border:    #6a2828;
      --red-text:      #e07070;
      --red-label:     #e07070;
    }
    * { transition: background-color .2s, border-color .2s, color .15s; }
    .pmw-dark-btn {
      align-self: center;
      background: none; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); color: var(--text-secondary);
      cursor: pointer; font-family: var(--font-sans);
      font-size: 18px; line-height: 1; padding: 4px 8px;
      transition: border-color .15s, color .15s;
    }
    .pmw-dark-btn:hover { border-color: var(--border-hi); color: var(--text-primary); }

    .pmw-seq-selector {
      display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
    }
    .pmw-seq-selector select {
      flex: 1; font-size: 13px;
    }
    .pmw-seq-load-btn {
      background: none; border: 0.5px solid var(--border-mid);
      border-radius: var(--radius-md); color: var(--text-secondary);
      cursor: pointer; font-family: var(--font-sans); font-size: 12px;
      font-weight: 500; padding: 6px 12px; white-space: nowrap;
      transition: border-color .15s, color .15s;
    }
    .pmw-seq-load-btn:hover { border-color: var(--teal-dot); color: var(--teal-text); }
    .pmw-ss-list { display: flex; flex-direction: column; gap: 6px; }
    .pmw-ss-empty { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 14px 0; border: 0.5px dashed var(--border-mid); border-radius: var(--radius-md); }
    .pmw-ss { display: flex; align-items: center; gap: 8px; padding: 8px 10px; background: var(--bg-secondary); border: 0.5px solid var(--border-lo); border-radius: var(--radius-md); }
    .pmw-ss-info { flex: 1; min-width: 0; }
    .pmw-ss-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pmw-ss-len  { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); }
    .pmw-ss-del { background: none; border: 0.5px solid var(--border-lo); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-size: 11px; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: border-color .15s, color .15s; }
    .pmw-ss-del:hover { border-color: #e24b4a; color: #e24b4a; }
    .pmw-panel-divider { height: 0.5px; background: var(--border-lo); margin: 4px 0; }

    .pmw-ext-card {
      margin-top: 10px; border-radius: var(--radius-lg);
      overflow: hidden; border: 0.5px solid var(--teal-border);
    }
    .pmw-ext-banner {
      padding: 8px 16px; font-size: 10px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase;
      background: var(--teal-bg); color: var(--teal-text);
      border-bottom: 0.5px solid var(--teal-border);
    }
    .pmw-ext-body { padding: 14px 16px; background: var(--bg-primary); }
    .pmw-ext-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .pmw-ext-table th { text-align: left; color: var(--text-secondary); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; padding: 0 12px 8px 0; }
    .pmw-ext-table td { padding: 5px 12px 5px 0; color: var(--text-primary); border-top: 0.5px solid var(--border-lo); }
    .pmw-ext-table td:last-child { color: var(--text-secondary); font-size: 12px; }
    .pmw-ext-note { font-size: 11px; color: var(--text-secondary); margin-top: 10px; line-height: 1.5; }
    .pmw-ext-source { font-size: 11px; color: var(--text-secondary); margin-top: 6px; font-style: italic; }

    @media (max-width: 520px) {
      .pmw-pair { grid-template-columns: 1fr 1fr; }
      .pmw-arr  { display: none; }
      .pmw-panel { width: 100%; }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/smiles-drawer@1.0.10/dist/smiles-drawer.min.js"></script>
</head>
<body>
<div class="pmw">

  <div class="pmw-header">
    <div class="pmw-icon">
      <svg viewBox="0 0 24 24"><path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2v-4M9 21H5a2 2 0 01-2-2v-4m0 0h18"></path></svg>
    </div>
    <div class="pmw-header-text">
      <h1>Protein Molecular Weight Calculator</h1>
      <div class="pmw-badge">Noncanonical amino acid support</div>
    </div>
    <button class="pmw-dark-btn" id="pmw-dark-btn" onclick="toggleDark()" title="Toggle dark mode">☀</button>

  </div>

  <div class="pmw-card">
    <div class="pmw-card-top"><div class="pmw-card-dot"></div><span>Amino acid sequence</span></div>
    <div class="pmw-card-body">
      <div class="pmw-seq-selector" id="pmw-seq-selector" style="display:none">
        <select id="pmw-seq-pick" onchange="previewSeq()"><option value="">— Load saved sequence —</option></select>
        <button class="pmw-seq-load-btn" onclick="loadSeq()">Load</button>
      </div>
      <textarea class="pmw-seq" id="pmw-seq" rows="4" placeholder="Paste single-letter sequence (lowercase accepted)" spellcheck="false"></textarea>
      <div class="pmw-stats" style="border-radius:var(--radius-md) var(--radius-md) 0 0">
        <div class="pmw-stat">Length&nbsp;<b id="pmw-len">0</b> aa</div>

  const sel = document.getElementById('pm'+id);

  if (!sel || !row) return;
  const name = sel.options[sel.selectedIndex].text;
  const smiles = lookupSmiles(name);
  if (!smiles) { row.style.display='none'; return; }
  if (typeof SmilesDrawer === 'undefined') {
    row.style.display='none'; return;
  }
  row.style.display = 'block';
  const canvasId = 'pmw-cvs-'+id;
  const canvas = document.getElementById(canvasId);
  if (!canvas) { row.style.display='none'; return; }
  const isDark = document.body.classList.contains('dark');
  const theme = isDark ? 'dark' : 'light';
  const w = canvas.parentElement ? canvas.parentElement.offsetWidth || 480 : 480;
  canvas.width = w;
  canvas.height = 200;
  try {
    const drawer = new SmilesDrawer.Drawer({
      width: w, height: 200,
      compactDrawing: false,
      explicitHydrogens: false,
      themes: {
        light: { C:'#222', O:'#c0392b', N:'#2980b9', S:'#d4ac0d', P:'#8e44ad', F:'#16a085', Cl:'#27ae60', Br:'#935116', I:'#6c3483', H:'#555' },

    SmilesDrawer.parse(smiles, function(tree) {
      try { drawer.draw(tree, canvasId, theme, false); } catch(e2) { row.style.display='none'; }
    }, function() { row.style.display='none'; });
  } catch(e) { row.style.display='none'; }
}

function getSeq() { return document.getElementById('pmw-seq').value.replace(/\s/g,'').toUpperCase(); }


function calcPi(seq) {
  const cnt = {D:0,E:0,C:0,H:0,K:0,R:0,Y:0};
  for (const a of seq) { if (cnt.hasOwnProperty(a)) cnt[a]++; }
  const pKaN=8.0, pKaC=3.1;
  const pKa = {D:3.9, E:4.1, C:8.3, H:6.0, K:10.5, R:12.5, Y:10.1};
  function charge(pH) {
    let q = 1/(1+Math.pow(10,pH-pKaN))          // N-term
            + cnt.H/(1+Math.pow(10,pH-pKa.H))
            + cnt.K/(1+Math.pow(10,pH-pKa.K))
            + cnt.R/(1+Math.pow(10,pH-pKa.R))
            - 1/(1+Math.pow(10,pKaC-pH))         // C-term
            - cnt.D/(1+Math.pow(10,pKa.D-pH))
            - cnt.E/(1+Math.pow(10,pKa.E-pH))
            - cnt.C/(1+Math.pow(10,pKa.C-pH))
            - cnt.Y/(1+Math.pow(10,pKa.Y-pH));
    return q;
  }
  let lo=0, hi=14;
  for (let i=0;i<200;i++) { const mid=(lo+hi)/2; charge(mid)>0?lo=mid:hi=mid; }
  return ((lo+hi)/2).toFixed(2);
}

function calcExt(seq) {
  let W=0,Y=0,C=0;
  for (const a of seq) { if(a==='W')W++; else if(a==='Y')Y++; else if(a==='C')C++; }
  const reduced  = W*5500 + Y*1490;
  const oxidized = reduced + Math.floor(C/2)*125;
  return {reduced, oxidized};
}

function pmwLive() {
  const raw = document.getElementById('pmw-seq').value.toUpperCase();
  document.getElementById('pmw-seq').value = raw.replace(/[^ACDEFGHIKLMNPQRSTVWY\s\n\r]/gi,'');
  const s = getSeq();
  document.getElementById('pmw-len').textContent = s.length;
  const w = document.getElementById('pmw-warn');
  if (!s.length) {
    document.getElementById('pmw-live').textContent='—';
    document.getElementById('pmw-pi').textContent='—';
    document.getElementById('pmw-ext').textContent='—';
    document.getElementById('pmw-ext2').textContent='';
    w.style.display='none'; return;
  }
  let mw=18.015, bad=null;
  for (const a of s) { if (!RES[a]) { bad=a; break; } mw+=RES[a]; }
  if (bad) {
    document.getElementById('pmw-live').textContent='—';
    document.getElementById('pmw-pi').textContent='—';
    document.getElementById('pmw-ext').textContent='—';
    document.getElementById('pmw-ext2').textContent='';
    w.textContent=`Unknown: "${bad}"`; w.style.display='flex';
  } else {
    document.getElementById('pmw-live').textContent=mw>=1000?`${(mw/1000).toFixed(2)} kDa`:`${mw.toFixed(2)} Da`;
    w.style.display='none';
    document.getElementById('pmw-pi').textContent = calcPi(s);
    const ext = calcExt(s);
    document.getElementById('pmw-ext').textContent = ext.reduced.toLocaleString() + ' M\u207Bcm\u207B';
    document.getElementById('pmw-ext2').textContent = ext.oxidized !== ext.reduced
      ? ` \u2022 ${ext.oxidized.toLocaleString()} M\u207Bcm\u207B (with S\u2013S)` : '';
  }
}

function pmwCalc() {
  const s=getSeq(), rEl=document.getElementById('pmw-result'), bEl=document.getElementById('pmw-result-banner'), bdEl=document.getElementById('pmw-result-body');
  function showErr(msg){rEl.className='pmw-result err';bEl.textContent='⚠ Error';bdEl.innerHTML=`<div class="pmw-err-msg">${msg}</div>`;}
  if (!s) { showErr('Please enter an amino acid sequence.'); return; }
  let base=18.015;
  for (const a of s) { if (!RES[a]) { showErr(`Invalid residue: "${a}". Use standard single-letter codes.`); return; } base+=RES[a]; }
  let corr=0; const deltas=[];
  for (const p of document.getElementById('pmw-pairs').children) {
    const id=p.id.replace('pp',''), oS=document.getElementById(`po${id}`), mS=document.getElementById(`pm${id}`);
    if (!oS||!mS) continue;
    const ov=parseFloat(oS.value)||0, mv=parseFloat(mS.value)||0;
    if (ov!==0||mv!==0) { const d=mv-ov; corr+=d; deltas.push({o:oS.options[oS.selectedIndex].text.split('–')[0].trim(),m:mS.options[mS.selectedIndex].text.split('(')[0].trim(),d}); }
  }
  const final=base+corr, sign=v=>(v>=0?'+':'')+v.toFixed(2);
  let chips=`<div class="pmw-chip">Base sequence <b>${base.toFixed(2)} Da</b></div><div class="pmw-chip">Length <b>${s.length} aa</b></div>`;
  for (const d of deltas) chips+=`<div class="pmw-chip ${d.d>=0?'delta-pos':'delta-neg'}">${d.o} → ${d.m} <b>${sign(d.d)} Da</b></div>`;
  if (deltas.length) chips+=`<div class="pmw-chip">Net correction <b>${sign(corr)} Da</b></div>`;
  bEl.textContent='Result';
  bdEl.innerHTML=`<div class="pmw-mw-row"><span class="pmw-mw">${final.toFixed(2)}</span><span class="pmw-unit">Da</span></div><div class="pmw-kda">${(final/1000).toFixed(2)} kDa</div><div class="pmw-chips">${chips}</div><button class="pmw-copy" onclick="doCopy('${final.toFixed(2)}',this)">Copy result</button>`;
  rEl.className='pmw-result ok';
  renderExtCard(s);
}

function renderExtCard(s) {
  const card = document.getElementById('pmw-ext-card');
  const body = document.getElementById('pmw-ext-body');
  if (!card||!body) return;

  let W=0,Y=0,C=0;
  for (const a of s) { if(a==='W')W++; else if(a==='Y')Y++; else if(a==='C')C++; }

  const pairs=[];
  for (const p of document.getElementById('pmw-pairs').children) {
    const id=p.id.replace('pp','');
    const oS=document.getElementById('po'+id), mS=document.getElementById('pm'+id);
    if(!oS||!mS) continue;
    const origName=oS.options[oS.selectedIndex].text;
    const mutName=mS.options[mS.selectedIndex].text;
    if(mutName==='None'||oS.selectedIndex===0) continue;
    const origAA=origName.split('–')[0].trim();
    const canonEps=CANON_EXT[origAA]||0;
    const extData=lookupNcaaExt(mutName);
    const ncaaEps=(extData?extData.find(e=>e.wl===280):null)||{eps:0};
    // Include if ncAA has known ε, OR if replacing a W/Y (must subtract their contribution)
    if(extData||canonEps>0) pairs.push({origAA, ncaaName:mutName, canonEps, ncaaEps:ncaaEps.eps, hasKnown:!!extData});
  }

  if(pairs.length===0) { card.style.display='none'; return; }
  card.style.display='block';

  let eps280 = W*5500+Y*1490+Math.floor(C/2)*125;
  const corrections=[];
  for (const p of pairs) {
    eps280=eps280-p.canonEps+p.ncaaEps;
    const ncaaLabel=p.ncaaName.split(' ')[0];
    const epsLabel=p.hasKnown?`+${p.ncaaEps.toLocaleString()}`:'ε unknown (assumed 0)';
    corrections.push(`${p.origAA} → ${ncaaLabel} (−${p.canonEps.toLocaleString()} ${epsLabel})`);
  }

  const corrNote = corrections.length ? corrections.join(', ') : 'Pace formula';
  body.innerHTML=`
    <div style="display:flex;align-items:baseline;gap:10px;margin-bottom:4px">
      <span style="font-size:28px;font-weight:500;color:var(--text-primary)">${eps280.toLocaleString()}</span>
      <span style="font-size:14px;color:var(--text-secondary)">M⁻cm⁻ (at 280 nm)</span>
    </div>
    <div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px">${corrNote}</div>`;
}

function doCopy(text,btn) { navigator.clipboard.writeText(text).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy result',1500);}); }

function pmwClear() {
  document.getElementById('pmw-seq').value=''; pmwLive();
  for (const p of document.getElementById('pmw-pairs').children) {
    const id=p.id.replace('pp',''), o=document.getElementById(`po${id}`), m=document.getElementById(`pm${id}`);
    if (o) o.selectedIndex=0; if (m) m.selectedIndex=0;
  }
  document.getElementById('pmw-result').className='pmw-result';
  const ec=document.getElementById('pmw-ext-card'); if(ec) ec.style.display='none';
}


function renderSeqSelector() {
  const sel = document.getElementById('pmw-seq-pick');
  const wrap = document.getElementById('pmw-seq-selector');
  if (!sel) return;
  if (SAVED_SEQS.length === 0) { wrap.style.display='none'; return; }
  wrap.style.display = 'flex';
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Load saved sequence —</option>' +
    SAVED_SEQS.map((s,i) => `<option value="${i}">${s.name} (${s.seq.length} aa)</option>`).join('');
  if (cur !== '') sel.value = cur;
}

function previewSeq() {}

function loadSeq() {
  const sel = document.getElementById('pmw-seq-pick');
  if (!sel || sel.value === '') return;
  const s = SAVED_SEQS[parseInt(sel.value)];
  if (!s) return;
  document.getElementById('pmw-seq').value = s.seq;
  pmwLive();
}



function toggleDark() {
  const dark = document.body.classList.toggle('dark');
  document.getElementById('pmw-dark-btn').textContent = dark ? '☾' : '☀';
  try { localStorage.setItem('pmw-dark', dark ? '1' : '0'); } catch(e) {}
  // redraw all visible structures with correct theme
  const g = document.getElementById('pmw-pairs');
  for (const p of g.children) { const id=p.id.replace('pp',''); drawStructure(id); }
}
(function(){
  try { if (localStorage.getItem('pmw-dark')==='1') { document.body.classList.add('dark'); document.getElementById('pmw-dark-btn').textContent='☾'; } } catch(e) {}
})();


window.pmwCalc       = pmwCalc;
window.pmwClear      = pmwClear;
window.pmwAdd        = pmwAdd;
window.pmwRm         = pmwRm;
window.loadSeq       = loadSeq;
window.previewSeq    = previewSeq;
window.doCopy        = doCopy;
window.drawStructure = drawStructure;
window.toggleDark    = toggleDark;

document.getElementById('pmw-seq').addEventListener('input', pmwLive);
renderSeqSelector();
pmwAdd();
</script>
